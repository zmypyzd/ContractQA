id: INV-W1
title: Anonymous landing page exposes no auth-shaped tokens
area: privacy
severity: P2
owner: dogfood
risk_tags: [privacy, fresh-session]

# WolfMind is a Vue 3 SPA with no auth. The invariant we can express on
# Phase 1's schema: a fresh visitor lands on / and the page DOES NOT
# leak any auth-shaped tokens into browser storage. This is a thin
# guarantee, but it's the only thing Phase 1's schema (url + storage +
# cookies) can say about a no-auth game UI.
preconditions:
  auth_state: anonymous
  role: visitor

actions:
  - { type: goto, path: / }
  - { type: wait, ms: 800 }

expected:
  url: { matches: "^/$" }
  localStorage: { no_key_matches: "^(authjs|next-auth|sb-|apk_sid|access_token)" }
  cookies: { no_name_matches: "^(authjs|next-auth|sb-access-token|apk_sid)" }

verification:
  wait_ms: 500
  retries: 1
  evidence_required: [state_diff]
