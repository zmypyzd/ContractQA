_format_version: '2.1'

services:
  - name: auth-v1-open
    url: http://auth:9999/verify
    routes:
      - name: auth-v1-open-verify
        paths: ['/auth/v1/verify']
  - name: auth-v1-open-callback
    url: http://auth:9999/callback
    routes:
      - name: auth-v1-open-callback-route
        paths: ['/auth/v1/callback']
  - name: auth-v1
    url: http://auth:9999/
    routes:
      - name: auth-v1-all
        paths: ['/auth/v1/']
        strip_path: true
  - name: rest-v1
    url: http://rest:3000/
    routes:
      - name: rest-v1-all
        paths: ['/rest/v1/']
        strip_path: true
    plugins:
      - name: cors
