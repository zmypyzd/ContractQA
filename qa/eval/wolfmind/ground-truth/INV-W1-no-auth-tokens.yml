review:
  validity: tp
  validity_verified_in_product: true
  specificity: 2
  severity_original: P2
  severity_final: P2
  notes: |
    Pre-existing hand-written invariant from dogfood/wolfmind/contracts/.
    WolfMind is a no-auth Vue 3 SPA, so this is the only Phase-1-schema-expressible
